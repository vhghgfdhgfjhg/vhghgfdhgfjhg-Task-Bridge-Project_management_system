<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <defs>
    <linearGradient id="gradActive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gradPending" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gradDone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <g transform="translate(30, 25)">
    <rect x="0" y="30" width="24" height="50" rx="6" fill="url(#gradPending)" filter="url(#shadow)" />
    <rect x="4" y="36" width="16" height="8" rx="3" fill="#ffffff" opacity="0.6" />
    
    <rect x="36" y="10" width="24" height="70" rx="6" fill="url(#gradActive)" filter="url(#shadow)" />
    <rect x="40" y="16" width="16" height="8" rx="3" fill="#ffffff" opacity="0.6" />
    <rect x="40" y="32" width="16" height="8" rx="3" fill="#ffffff" opacity="0.6" />
    <rect x="40" y="48" width="16" height="8" rx="3" fill="#ffffff" opacity="0.3" />

    <rect x="72" y="40" width="24" height="40" rx="6" fill="url(#gradDone)" filter="url(#shadow)" />
    <rect x="76" y="46" width="16" height="8" rx="3" fill="#ffffff" opacity="0.8" />
  </g>

  <g transform="translate(150, 85)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#1E293B">Task</text>
    <text x="100" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="46" font-weight="300" fill="#4F46E5">Bridge</text>
    <text x="2" y="24" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#64748B" letter-spacing="4.5">PROJECT MANAGEMENT</text>
  </g>
</svg>